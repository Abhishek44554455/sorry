<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorry Kritika 💖</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
        background: black;
        color: white;
      }

      /* Intro */
      .intro {
        position: fixed;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #000, #1a1a1a);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 10;
        animation: fadeOut 2s ease forwards;
        animation-delay: 3s;
      }

      .intro h1 {
        font-size: 8vw;
        opacity: 0;
        animation: zoomIn 2s forwards;
      }

      .intro p {
        opacity: 0;
        animation: fadeIn 2s forwards;
        animation-delay: 1.5s;
      }

      @keyframes zoomIn {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes fadeOut {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      /* Main */
      .main {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }

      #text {
        font-size: 8vw;
        border-right: 3px solid white;
        white-space: nowrap;
        overflow: hidden;
      }

      .sub {
        margin-top: 10px;
        font-size: 4vw;
        color: #ffb6c1;
      }

      .heart {
        font-size: 12vw;
        animation: beat 1s infinite;
      }

      @keyframes beat {
        50% {
          transform: scale(1.2);
        }
      }

      /* Controls */
      .controls {
        position: fixed;
        top: 10px;
        right: 10px;
        display: flex;
        gap: 8px;
      }

      button {
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
      }

      /* Floating hearts */
      .float-heart {
        position: absolute;
        bottom: 0;
        font-size: 20px;
        animation: rise 5s linear infinite;
      }

      @keyframes rise {
        to {
          transform: translateY(-100vh);
          opacity: 0;
        }
      }

      .tap {
        position: absolute;
        bottom: 30px;
        width: 100%;
        text-align: center;
        font-size: 4vw;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="intro">
      <h1>For Kritika 💖</h1>
      <p>Something I should’ve said earlier...</p>
    </div>

    <div class="controls">
      <button onclick="toggleSound()">🔊</button>
      <button onclick="changeTrack()">🎵</button>
    </div>

    <div class="main">
      <div id="text"></div>
      <div class="sub">I’m late… but I truly mean it 💫</div>
      <div class="heart">💖</div>
    </div>

    <div class="tap">Tap anywhere to start</div>

    <audio id="music" loop></audio>

    <script>
      let started = false;
      let i = 0;
      const message = "Sorry Kritika 💔";

      /* Royalty-free tracks */
      const tracks = [
        "https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6c77.mp3",
        "https://cdn.pixabay.com/audio/2022/10/25/audio_946f54c8b1.mp3",
        "https://cdn.pixabay.com/audio/2022/02/23/audio_c8c8a73467.mp3",
      ];

      let currentTrack = 0;
      const music = document.getElementById("music");
      music.src = tracks[currentTrack];

      /* Start on tap */
      document.body.addEventListener("click", () => {
        if (!started) {
          music.play();
          typeText();
          started = true;
        }
      });

      /* Typing */
      function typeText() {
        const el = document.getElementById("text");
        if (i < message.length) {
          el.innerHTML += message.charAt(i);
          i++;
          setTimeout(typeText, 120);
        }
      }

      /* Hearts */
      setInterval(() => {
        let h = document.createElement("div");
        h.className = "float-heart";
        h.innerHTML = "💖";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
      }, 400);

      /* Sound toggle */
      let playing = true;
      function toggleSound() {
        if (playing) music.pause();
        else music.play();
        playing = !playing;
      }

      /* Change track */
      function changeTrack() {
        currentTrack = (currentTrack + 1) % tracks.length;
        music.src = tracks[currentTrack];
        music.play();
      }
    </script>
  </body>
</html>
